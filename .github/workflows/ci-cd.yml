name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ---- Job 1: Test ----
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run tests
        working-directory: ./backend
        run: npm test

  # ---- Job 2: Build & Push Docker Images ----
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }},${{ env.BACKEND_IMAGE }}:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }},${{ env.FRONTEND_IMAGE }}:latest

  # ---- Job 3: Deploy to VPS ----
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Login to GHCR
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # Stop old containers
            docker stop backend frontend db 2>/dev/null || true
            docker rm backend frontend db 2>/dev/null || true

            # Create network if not exists
            docker network create app-network 2>/dev/null || true

            # Start database
            docker run -d --name db \
              --network app-network \
              -e POSTGRES_DB=taskmanager \
              -e POSTGRES_USER=postgres \
              -e POSTGRES_PASSWORD=postgres \
              -v pgdata:/var/lib/postgresql/data \
              postgres:15-alpine

            # Wait for DB to be ready
            sleep 5

            # Start backend
            docker run -d --name backend \
              --network app-network \
              -e DB_HOST=db \
              -e DB_PORT=5432 \
              -e DB_NAME=taskmanager \
              -e DB_USER=postgres \
              -e DB_PASSWORD=postgres \
              -p 3000:3000 \
              ${{ env.BACKEND_IMAGE }}:latest

            # Start frontend
            docker run -d --name frontend \
              --network app-network \
              -p 80:80 \
              ${{ env.FRONTEND_IMAGE }}:latest

            echo "Deployment complete!"
